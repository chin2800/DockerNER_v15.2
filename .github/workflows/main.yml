name: Test Docker Image

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]

jobs:
  test-image:
    runs-on: ubuntu-latest

    steps:
    - name: Pull Docker image
      run: docker pull ko178b4/ner29_v2:latest

    - name: Run container
      run: |
        docker run -d -p 5000:5000 --name test-container ko178b4/ner29_v2:latest

    - name: Wait for startup
      run: sleep 15

    - name: Show logs (IMPORTANT)
      run: docker logs test-container

    - name: Check if container is running
      run: docker ps -a

    - name: Test endpoint (optional)
      run: |
        curl http://localhost:5000 || echo "Service not responding"

    - name: Stop container
      run: docker stop test-container || true
